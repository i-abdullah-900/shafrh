<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="شَفرة — نشرة أسبوعية تفكّك الأفكار التي تشكّلنا. من علم النفس إلى التكنولوجيا إلى الفلسفة.">
    <meta property="og:title" content="شَفرة — فك الشفرات الصامتة">
    <meta property="og:description" content="نشرة أسبوعية تفكّك الأفكار التي تشكّلنا">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://shafrh.com">
    <meta name="twitter:card" content="summary_large_image">
    <title>شَفرة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Amiri:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --burgundy: #733034;
            --text-light: #FFFFFF;
            --font-display: 'Amiri', 'Noto Naskh Arabic', Georgia, serif;
            --font-body: 'Noto Naskh Arabic', Georgia, serif;
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--black);
            color: var(--text-light);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        @keyframes appear {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
        }

        .hero-title {
            font-family: var(--font-display);
            font-size: clamp(2.8rem, 8vw, 5.5rem);
            font-weight: 700;
            letter-spacing: -1px;
            color: #f9f7f7;
            animation: appear 0.8s ease 0.2s both;
        }

        .hero-desc {
            max-width: 440px;
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.1rem;
            line-height: 2;
            margin: 24px auto 40px;
            animation: appear 0.8s ease 0.4s both;
        }

        .hero-embed {
            animation: appear 0.8s ease 0.6s both;
            width: 100%;
            max-width: 480px;
            display: flex;
            justify-content: center;
        }

        .hero-embed iframe {
            width: 100%;
            height: 125px;
            border: none;
            background: transparent;
        }

        .footer {
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding: 40px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 720px;
            margin: 0 auto;
        }

        .footer-copy {
            color: rgba(255, 255, 255, 0.12);
            font-size: 0.7rem;
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer-links a {
            color: var(--burgundy);
            text-decoration: none;
            font-size: 0.7rem;
            transition: opacity 0.3s;
        }

        .footer-links a:hover {
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            .hero {
                padding: 100px 20px 60px;
            }

            .footer {
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <section class="hero">
        <h1 class="hero-title">نشرة شفرة</h1>
        <p class="hero-desc">نشرة تهتم بتفكيك فكرة، تعزيز وعي، واكتشاف نمط</p>
        <div class="hero-embed">
            <iframe src="https://subscribe-forms.beehiiv.com/4ce85085-29c4-4b27-9e70-3f9f1efcc2aa"
                frameborder="0" scrolling="no"></iframe>
        </div>
    </section>

    <footer class="footer">
        <span class="footer-copy">© شَفرة 2026 — جميع الحقوق محفوظة</span>
        <div class="footer-links">
            <a href="https://x.com/shafrh9" target="_blank">X</a>
            <a href="https://instagram.com/shafrh9" target="_blank">Instagram</a>
        </div>
    </footer>

</body>

</html>
